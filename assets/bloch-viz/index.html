<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloch Viz</title>
  <style>
    body {
      margin: 0;
      background-color: #fff;
      color: #000;
      overscroll-behavior: none;
      font-family: Tahoma, Geneva, sans-serif;
    }

    button {
      cursor: pointer;
    }

    #controls {
      position: absolute;
      height: 100%;
      right: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      z-index: 1005;
    }

    #controls>button {
      display: inline-block;
      width: 1.7rem;
      text-align: center;
      background: #505a62 linear-gradient(0.45turn, rgba(255, 255, 255, 0.1), rgba(0, 0, 0, 0.05));
      color: white;
      padding: 0.1rem;
      font-weight: 600;
      border-radius: 0.2rem;
      border: 0;
      line-height: 1.5rem;
      margin: 0.2rem 1rem;
    }

    #controls>button.active {
      box-shadow: 0 0 0 2px #1f2937 inset;
    }

    canvas {
      display: block;
      margin: 0 auto;
      outline: none;
      width: 320px;
      height: 320px;
    }

    .state {
      font-size: 1rem;
      position: absolute;
      top: 0;
      width: 100%;
      padding: 5px 0;
      line-height: 1.3;
      box-sizing: border-box;
      text-align: center;
      user-select: none;
      pointer-events: none;
      color: #545454;
      white-space: pre-line;
    }

    .settings {
      user-select: none;
      position: absolute;
      bottom: 0;
      left: 0;
      padding: 0.8rem 1rem;
      box-sizing: border-box;
      width: 100%;
    }

    #reset {
      text-decoration: none;
      font-family: 'SF Pro Text', system-ui, -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      padding: 0.45rem 0.65rem;
      transition: background-color 0.2s, color 0.2s;
      border-radius: 6px;
      display: inline-block;
      color: #202020;
    }

    #reset:hover {
      cursor: pointer;
      background-color: black;
      color: white;
    }
  </style>
</head>

<body>
  <div class="state" id="state-label"></div>
  <div id="controls"></div>
  <canvas id="bloch" width="460" height="460" tabindex="0" style="width: 320px; height: 320px;"></canvas>
  <div class="settings"><a id="reset">Reset</a></div>

  <script>
    const SQRT2 = Math.sqrt(2);
    const query = new URLSearchParams(location.search);
    const gates = (query.get('gates') || 'H,X')
      .split(',')
      .map((gate) => gate.trim().toUpperCase())
      .filter(Boolean);
    const showKet = !query.has('noKet');
    const showPlusMinus = query.has('showPlusMinus');

    const controls = document.getElementById('controls');
    const canvas = document.getElementById('bloch');
    const ctx = canvas.getContext('2d');
    const resetEl = document.getElementById('reset');
    const labelEl = document.getElementById('state-label');

    const state = {
      a0: { re: 1, im: 0 },
      a1: { re: 0, im: 0 },
      trace: [],
      hoverGate: null
    };

    function complex(re, im = 0) { return { re, im }; }
    function cAbs2(value) { return value.re * value.re + value.im * value.im; }
    function cAdd(a, b) { return complex(a.re + b.re, a.im + b.im); }
    function cSub(a, b) { return complex(a.re - b.re, a.im - b.im); }
    function cMul(a, b) { return complex(a.re * b.re - a.im * b.im, a.re * b.im + a.im * b.re); }
    function cScale(a, scalar) { return complex(a.re * scalar, a.im * scalar); }

    function normalize() {
      const n = Math.sqrt(cAbs2(state.a0) + cAbs2(state.a1)) || 1;
      state.a0 = cScale(state.a0, 1 / n);
      state.a1 = cScale(state.a1, 1 / n);
    }

    function blochPoint() {
      const a0Conj = complex(state.a0.re, -state.a0.im);
      const cross = cMul(a0Conj, state.a1);
      return {
        x: 2 * cross.re,
        y: 2 * cross.im,
        z: cAbs2(state.a0) - cAbs2(state.a1)
      };
    }

    function rotateForView(v) {
      const yaw = Math.PI / 4;
      const pitch = -Math.PI / 6;

      const cy = Math.cos(yaw), sy = Math.sin(yaw);
      const cp = Math.cos(pitch), sp = Math.sin(pitch);

      const xYaw = v.x * cy - v.y * sy;
      const yYaw = v.x * sy + v.y * cy;
      const zYaw = v.z;

      const xPitch = xYaw;
      const yPitch = yYaw * cp - zYaw * sp;
      const zPitch = yYaw * sp + zYaw * cp;

      return { x: xPitch, y: yPitch, z: zPitch };
    }

    function project(v, radius, centerX, centerY) {
      const rotated = rotateForView(v);
      return {
        x: centerX + rotated.x * radius,
        y: centerY + rotated.y * radius,
        depth: rotated.z
      };
    }

    function drawArrow(from, to, color, width, head) {
      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = 'round';
      ctx.stroke();

      const angle = Math.atan2(to.y - from.y, to.x - from.x);
      ctx.beginPath();
      ctx.moveTo(to.x, to.y);
      ctx.lineTo(to.x - head * Math.cos(angle - Math.PI / 7), to.y - head * Math.sin(angle - Math.PI / 7));
      ctx.lineTo(to.x - head * Math.cos(angle + Math.PI / 7), to.y - head * Math.sin(angle + Math.PI / 7));
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
    }

    function axisForGate(gate) {
      if (gate === 'X') return { x: 1, y: 0, z: 0 };
      if (gate === 'T') return { x: 0, y: 0, z: 1 };
      if (gate === 'H') {
        const value = 1 / Math.sqrt(2);
        return { x: value, y: 0, z: value };
      }
      return null;
    }

    function drawRotationAxis(center, radius) {
      if (!state.hoverGate) return;
      const axis = axisForGate(state.hoverGate);
      if (!axis) return;

      const p1 = project({ x: -axis.x, y: -axis.y, z: -axis.z }, radius, center.x, center.y);
      const p2 = project(axis, radius, center.x, center.y);

      ctx.setLineDash([7, 6]);
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.strokeStyle = '#ef4444';
      ctx.lineWidth = 4;
      ctx.stroke();
      ctx.setLineDash([]);

      // Draw small curved hint around center to indicate rotation
      const c = project({ x: 0, y: 0, z: 0 }, radius, center.x, center.y);
      ctx.beginPath();
      ctx.arc(c.x + 6, c.y - 2, 16, -0.4, 1.8);
      ctx.strokeStyle = '#ef4444';
      ctx.lineWidth = 3;
      ctx.stroke();

      const tipAngle = 1.8;
      const tx = c.x + 6 + 16 * Math.cos(tipAngle);
      const ty = c.y - 2 + 16 * Math.sin(tipAngle);
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(tx - 6, ty - 2);
      ctx.lineTo(tx - 1, ty - 7);
      ctx.closePath();
      ctx.fillStyle = '#ef4444';
      ctx.fill();
    }

    function renderLabel() {
      const p0 = cAbs2(state.a0);
      const p1 = cAbs2(state.a1);

      const ket = showKet
        ? `|ψ⟩ = (${state.a0.re.toFixed(3)} ${state.a0.im >= 0 ? '+' : '-'} ${Math.abs(state.a0.im).toFixed(3)}i)|0⟩ + (${state.a1.re.toFixed(3)} ${state.a1.im >= 0 ? '+' : '-'} ${Math.abs(state.a1.im).toFixed(3)}i)|1⟩\n`
        : '';

      const plusMinus = showPlusMinus ? '|+⟩/|-⟩ enabled\n' : '';
      labelEl.textContent = `${ket}${plusMinus}P(|0⟩)=${(p0 * 100).toFixed(1)}% · P(|1⟩)=${(p1 * 100).toFixed(1)}%`;
    }

    function drawSphere() {
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2 + 12;
      const radius = 148;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const bg = ctx.createRadialGradient(centerX - 40, centerY - 70, 30, centerX, centerY, radius + 90);
      bg.addColorStop(0, '#eeeeee');
      bg.addColorStop(1, '#cfcfcf');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(214,214,214,0.7)';
      ctx.fill();
      ctx.strokeStyle = '#a4a4a4';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.strokeStyle = 'rgba(120,120,120,0.45)';
      ctx.lineWidth = 2;

      [0, Math.PI / 2].forEach((phi) => {
        ctx.beginPath();
        for (let index = 0; index <= 120; index += 1) {
          const t = (index / 120) * Math.PI * 2;
          const p = project({ x: Math.cos(t) * Math.cos(phi), y: Math.sin(t), z: Math.cos(t) * Math.sin(phi) }, radius, centerX, centerY);
          if (index === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();
      });

      ctx.setLineDash([7, 9]);
      ctx.strokeStyle = '#6b6b6b';
      ctx.beginPath();
      for (let index = 0; index <= 140; index += 1) {
        const t = (index / 140) * Math.PI * 2;
        const p = project({ x: Math.cos(t), y: Math.sin(t), z: 0 }, radius, centerX, centerY);
        if (index === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
      ctx.setLineDash([]);

      const origin = project({ x: 0, y: 0, z: 0 }, radius, centerX, centerY);
      const axisX = project({ x: 1.15, y: 0, z: 0 }, radius, centerX, centerY);
      const axisY = project({ x: 0, y: 1.15, z: 0 }, radius, centerX, centerY);
      const axisZ = project({ x: 0, y: 0, z: 1.2 }, radius, centerX, centerY);
      const axisZDown = project({ x: 0, y: 0, z: -1.08 }, radius, centerX, centerY);

      drawArrow(origin, axisX, '#555', 3, 13);
      drawArrow(origin, axisY, '#556b54', 3, 13);
      drawArrow(origin, axisZ, '#111', 4, 16);

      ctx.beginPath();
      ctx.moveTo(origin.x, origin.y);
      ctx.lineTo(axisZDown.x, axisZDown.y);
      ctx.strokeStyle = '#6f6f6f';
      ctx.lineWidth = 2;
      ctx.stroke();

      drawRotationAxis({ x: centerX, y: centerY }, radius);

      const tip = project(blochPoint(), radius, centerX, centerY);
      drawArrow(origin, tip, '#57bf92', 6, 14);

      state.trace.forEach((pt) => {
        const p = project(pt, radius, centerX, centerY);
        ctx.beginPath();
        ctx.arc(p.x, p.y, 5.2, 0, Math.PI * 2);
        ctx.fillStyle = '#f21e1e';
        ctx.fill();
        ctx.strokeStyle = '#c90f0f';
        ctx.lineWidth = 1;
        ctx.stroke();
      });

      ctx.fillStyle = '#505050';
      ctx.font = 'italic 36px Georgia, serif';
      ctx.fillText('x', axisX.x - 18, axisX.y + 20);
      ctx.fillText('y', axisY.x + 8, axisY.y + 8);
      ctx.font = '700 36px Georgia, serif';
      ctx.fillText('z', axisZ.x - 6, axisZ.y - 7);

      if (!query.has('noKet')) {
        ctx.font = '500 28px Georgia, serif';
        ctx.fillText('|0⟩', axisZ.x + 8, axisZ.y + 6);
        ctx.fillText('|1⟩', axisZDown.x + 8, axisZDown.y + 4);
      }

      renderLabel();
    }

    function applyGate(gate) {
      const a0 = state.a0;
      const a1 = state.a1;

      if (gate === 'X') {
        state.a0 = a1;
        state.a1 = a0;
      } else if (gate === 'H') {
        state.a0 = cScale(cAdd(a0, a1), 1 / SQRT2);
        state.a1 = cScale(cSub(a0, a1), 1 / SQRT2);
      } else if (gate === 'T') {
        const phase = complex(Math.cos(Math.PI / 4), Math.sin(Math.PI / 4));
        state.a0 = a0;
        state.a1 = cMul(a1, phase);
      }

      normalize();
      state.trace.push(blochPoint());
      if (state.trace.length > 26) state.trace.shift();
      drawSphere();
    }

    function resetState() {
      state.a0 = complex(1, 0);
      state.a1 = complex(0, 0);
      state.trace = [blochPoint()];
      drawSphere();
    }

    function setHoverGate(gate) {
      state.hoverGate = gate;
      const buttons = controls.querySelectorAll('button');
      buttons.forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.gate === gate);
      });
      drawSphere();
    }

    gates.forEach((gate) => {
      const button = document.createElement('button');
      button.textContent = gate;
      button.dataset.gate = gate;
      button.title = `Apply ${gate}`;
      button.addEventListener('click', () => applyGate(gate));
      button.addEventListener('mouseenter', () => setHoverGate(gate));
      button.addEventListener('mouseleave', () => setHoverGate(null));
      controls.appendChild(button);
    });

    resetEl.addEventListener('click', (event) => {
      event.preventDefault();
      resetState();
    });

    resetState();
  </script>
</body>

</html>
